name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Linux ───────────────────────────────────────────────────────────────────
  # Typecheck, lint, and full test suite including bwrap sandbox tests.
  # bwrap is installed from apt; macOS sandbox-exec tests skip automatically.
  test-linux:
    name: test (linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install dependencies
        run: npm install

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: install bwrap
        run: sudo apt-get install -y bubblewrap

      - name: test
        run: npm test
        env:
          PI_SKIP_VERSION_CHECK: "1"

  # ── macOS ────────────────────────────────────────────────────────────────────
  # Sandbox-exec integration tests. bwrap tests skip automatically.
  # Runs on Apple Silicon (macos-14) — most representative of user hardware.
  #
  # The pi SDK (@earendil-works/pi-coding-agent) is installed globally so the
  # sandbox tests can import it from the global node_modules path, matching
  # how real pit sessions work (pi is a globally-installed CLI tool).
  test-macos:
    name: test (macos)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install dependencies
        run: npm install

      - name: install pi SDK globally
        # Installs to $(node -e "process.execPath")/../../lib/node_modules,
        # the path the sandbox-macos tests resolve via nodeDir/lib/node_modules.
        run: npm install -g @earendil-works/pi-coding-agent

      - name: test
        run: npm test
        env:
          PI_SKIP_VERSION_CHECK: "1"

  # ── macOS Intel ───────────────────────────────────────────────────────────────
  # Secondary macOS run on Intel to catch architecture-specific mach/sysctl
  # differences (Rosetta 2, different dyld paths). Validates Grill 8 baseline
  # on both architectures before trimming the mach service list.
  test-macos-intel:
    name: test (macos intel)
    runs-on: macos-13
    # Only run on the default branch and tags — Intel runner minutes are limited.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install dependencies
        run: npm install

      - name: install pi SDK globally
        run: npm install -g @earendil-works/pi-coding-agent

      - name: test
        run: npm test
        env:
          PI_SKIP_VERSION_CHECK: "1"
